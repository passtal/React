spring.application.name=login

# DataSource - MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/aloha?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false&autoReconnection=true
spring.datasource.username=aloha
spring.datasource.password=123456

# Mybatis
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.aloha.login.domain
mybatis.mapper-locations=classpath:com/aloha/login/mapper/**/**.xml

# [개선] Logging - INFO 레벨 (기존: DEBUG)
logging.level.root=INFO
logging.level.com.aloha.login=INFO

